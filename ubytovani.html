<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vítejte u nás | Jinachalupa.cz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --pine: #2d4a35; --wheat: #e8d8b0; --cream: #faf7f0; --gold: #c9a84c; --text: #2a1f1a; --white: #ffffff; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); padding-bottom: 50px; }
  .header { background: var(--pine); color: var(--wheat); padding: 40px 20px; text-align: center; }
  .container { max-width: 600px; margin: 0 auto; padding: 20px; text-align: center; }
  .card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
  h2 { font-family: 'Playfair Display'; color: var(--pine); margin-bottom: 20px; font-size: 1.6rem; }
  
  /* Wi-Fi kód */
  .wifi-instructions { color: var(--gold); font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}
  .qr-code { width: 100%; max-width: 280px; height: auto; margin: 10px auto 10px auto; display: block; border: 1px solid #eee; padding: 15px; border-radius: 10px; }

  /* Tlačítka kontaktů */
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
  .contact-btn { display: block; background: var(--pine); color: white; text-align: center; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.95rem; transition: 0.3s; }
  .contact-btn:hover { background: var(--gold); transform: scale(1.03); }
  
  .back-link { display: inline-block; margin-top: 30px; color: var(--pine); text-decoration: none; font-size: 0.9rem; border-bottom: 1px solid transparent; }
  .back-link:hover { border-bottom-color: var(--pine); }

  @media (max-width: 480px) {
    .contact-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1 style="font-family: 'Playfair Display'; font-size: 2.5rem;">Vítejte u nás!</h1>
  <p style="margin-top: 10px; font-weight: 300; text-transform: uppercase; letter-spacing: 1.5px;">Informace pro ubytované hosty</p>
</div>

<div class="container">
  
  <div class="card">
    <h2>🌐 Rychlé Wi-Fi</h2>
    <p class="wifi-instructions">Naskenujte kód k připojení</p>
    
    <!-- Externí odkaz na obrázek -->
    <img src="https://i.postimg.cc/sx0ZMHRD/wifi.png" alt="Wi-Fi QR Code" class="qr-code">
  </div>

  <div class="card">
    <h2>📞 Potřebujete pomoci?</h2>
    <p style="margin-bottom: 15px; color: #555;">Neváhejte se na nás obrátit s dotazy.</p>
    
    <div class="contact-grid">
      <a href="tel:+420608945349" class="contact-btn">📞 Obecné dotazy<br><span style="font-weight: 300; font-size: 0.8rem;">608 945 349</span></a>
      <a href="tel:+420735161332" class="contact-btn">⚙️ Technické dotazy<br><span style="font-weight: 300; font-size: 0.8rem;">735 161 332</span></a>
    </div>
  </div>

  <a href="index.html" class="back-link">← Zpět na hlavní stránku Jinachalupa.cz</a>
</div>

</body>
</html>
